<div class="home-content">
    <h2 class="is-center">⚡ Быстрая заметка</h2>
    <form id="note-form" class="row is-center">
        <input type="text" id="note-input" placeholder="Введите текст заметки" required>
        <button type="submit" class="button primary">Добавить</button>
    </form>

    <h2 class="is-center" style="margin:2rem 0 1rem;">⏰ Заметка с напоминанием</h2>
    <form id="reminder-form" class="row is-center">
        <input type="text" id="reminder-text" placeholder="О чем напомнить?" required style="flex:2;">
        <input type="datetime-local" id="reminder-time" required style="flex:1;">
        <button type="submit" class="button success">Напомнить</button>
    </form>

    <h2 class="is-center" style="margin:2rem 0 1rem;">Список задач</h2>
    <ul id="notes-list"></ul>
</div>
