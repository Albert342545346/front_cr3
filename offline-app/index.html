<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#4285f4">
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Заметки (13-18)</title>
    <link rel="stylesheet" href="https://unpkg.com/chota@latest">
    <link rel="icon" href="icons/favicon.ico" sizes="16x16" type="image/ico">
    <style>
        :root {
            --bg-ivory: #FAF8F0;
            --card-bg: #FFFFFF;
            --text-primary: #3E3C33;
            --text-secondary: #8A8578;
            --accent: #C9B896;
            --accent-hover: #B5A382;
            --border: #E8E2D4;
            --shadow: 0 4px 12px rgba(62, 60, 51, 0.08);
            --radius: 12px;
        }
        
        body {
            background-color: var(--bg-ivory);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 0;
            margin: 0;
        }
        
        header {
            background: var(--card-bg);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        
        h1 {
            text-align: center;
            margin: 0;
            font-size: 1.8rem;
        }
        
        .tabs {
            max-width: 600px;
            margin: 1.5rem auto 0;
            display: flex;
            gap: 0.5rem;
        }
        
        .tab {
            flex: 1;
            padding: 0.7rem;
            border: none;
            background: var(--border);
            cursor: pointer;
            font-size: 1rem;
            border-radius: 8px;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        
        .tab.active {
            background: var(--accent);
            color: #fff;
            font-weight: 600;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem 2rem;
        }
        
        h2 {
            text-align: center;
            margin: 1.5rem 0 1rem;
        }
        
        .row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        
        input {
            flex: 1;
            padding: 0.9rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
            background: #fff;
            min-width: 200px;
        }
        
        input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .button.primary {
            background: #198754;
            color: white;
        }
        
        .button.success {
            background: #28a745;
            color: white;
        }
        
        .button.error {
            background: #dc3545;
            color: white;
        }
        
        #notes-list {
            list-style: none;
            padding: 0;
            margin-top: 1rem;
        }
        
        #notes-list li {
            background: var(--card-bg);
            padding: 1rem;
            margin-bottom: 0.7rem;
            border-radius: 10px;
            box-shadow: var(--shadow);
            border-left: 4px solid var(--accent);
        }
        
        #notes-list li small {
            display: block;
            margin-top: 4px;
            color: #667eea;
            font-size: 0.85rem;
        }
        
        footer {
            margin-top: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>«Заметки» — оффлайн-приложение</h1>
        <nav class="tabs is-center">
            <button id="home-btn" class="tab active">Главная</button>
            <button id="about-btn" class="tab">О приложении</button>
        </nav>
    </header>

    <main id="app-content" class="container">
        <!-- Сюда подгружается контент -->
    </main>

    <footer>
        <button id="enable-push" class="button success">🔔 Включить уведомления</button>
        <button id="disable-push" class="button error" style="display:none;">🔕 Отключить</button>
    </footer>

    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
